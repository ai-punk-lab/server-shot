name: Release APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-and-release:
    name: Build & Release APK
    needs: analyze-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in pubspec
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.VERSION }}+${GITHUB_RUN_NUMBER}/" pubspec.yaml

      - name: Build Release APK
        run: flutter build apk --release

      - name: Build Split APKs (per ABI)
        run: flutter build apk --split-per-abi --release

      - name: Rename APKs
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ServerShot-${VERSION}-universal.apk
          mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
             build/app/outputs/flutter-apk/ServerShot-${VERSION}-arm64-v8a.apk
          mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
             build/app/outputs/flutter-apk/ServerShot-${VERSION}-armeabi-v7a.apk
          mv build/app/outputs/flutter-apk/app-x86_64-release.apk \
             build/app/outputs/flutter-apk/ServerShot-${VERSION}-x86_64.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ServerShot v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/ServerShot-*.apk
